<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart Test - Fuji Card Market</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    .success { background: #4caf50; color: white; }
    .error { background: #f44336; color: white; }
    pre { background: #f5f5f5; padding: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>🛒 Cart Functionality Test</h1>
  
  <div class="test-section">
    <h2>1. Get Current Cart</h2>
    <button onclick="getCart()">Get Cart</button>
    <pre id="cart-result"></pre>
  </div>

  <div class="test-section">
    <h2>2. Add Product to Cart</h2>
    <input type="text" id="product-id" placeholder="Product UUID" value="">
    <input type="number" id="quantity" placeholder="Quantity" value="1" min="1">
    <button onclick="addToCart()">Add to Cart</button>
    <pre id="add-result"></pre>
  </div>

  <div class="test-section">
    <h2>3. Update Cart Item</h2>
    <input type="text" id="item-id" placeholder="Cart Item ID">
    <input type="number" id="new-qty" placeholder="New Quantity" value="2">
    <button onclick="updateCart()">Update Quantity</button>
    <pre id="update-result"></pre>
  </div>

  <div class="test-section">
    <h2>4. Remove from Cart</h2>
    <input type="text" id="remove-item-id" placeholder="Cart Item ID">
    <button onclick="removeFromCart()">Remove Item</button>
    <pre id="remove-result"></pre>
  </div>

  <div class="test-section">
    <h2>5. Clear Cart</h2>
    <button onclick="clearCart()" class="error">Clear Entire Cart</button>
    <pre id="clear-result"></pre>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';
    
    // Generate or get session ID
    let sessionId = localStorage.getItem('test-session-id');
    if (!sessionId) {
      sessionId = 'test_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('test-session-id', sessionId);
    }
    console.log('Session ID:', sessionId);

    async function apiCall(endpoint, method = 'GET', data = null) {
      const options = {
        method,
        headers: {
          'Content-Type': 'application/json',
          'x-session-id': sessionId
        }
      };
      if (data) options.body = JSON.stringify(data);
      
      const response = await fetch(API_URL + endpoint, options);
      return await response.json();
    }

    async function getCart() {
      try {
        const result = await apiCall('/cart');
        document.getElementById('cart-result').textContent = JSON.stringify(result, null, 2);
      } catch (error) {
        document.getElementById('cart-result').textContent = 'Error: ' + error.message;
      }
    }

    async function addToCart() {
      const productId = document.getElementById('product-id').value;
      const quantity = parseInt(document.getElementById('quantity').value);
      
      if (!productId) {
        alert('Please enter a product ID');
        return;
      }

      try {
        const result = await apiCall('/cart/add', 'POST', { productId, quantity });
        document.getElementById('add-result').textContent = JSON.stringify(result, null, 2);
        setTimeout(() => getCart(), 500); // Refresh cart after add
      } catch (error) {
        document.getElementById('add-result').textContent = 'Error: ' + error.message;
      }
    }

    async function updateCart() {
      const itemId = document.getElementById('item-id').value;
      const quantity = parseInt(document.getElementById('new-qty').value);
      
      if (!itemId) {
        alert('Please enter an item ID');
        return;
      }

      try {
        const result = await apiCall(`/cart/update/${itemId}`, 'PUT', { quantity });
        document.getElementById('update-result').textContent = JSON.stringify(result, null, 2);
        setTimeout(() => getCart(), 500);
      } catch (error) {
        document.getElementById('update-result').textContent = 'Error: ' + error.message;
      }
    }

    async function removeFromCart() {
      const itemId = document.getElementById('remove-item-id').value;
      
      if (!itemId) {
        alert('Please enter an item ID');
        return;
      }

      try {
        const result = await apiCall(`/cart/remove/${itemId}`, 'DELETE');
        document.getElementById('remove-result').textContent = JSON.stringify(result, null, 2);
        setTimeout(() => getCart(), 500);
      } catch (error) {
        document.getElementById('remove-result').textContent = 'Error: ' + error.message;
      }
    }

    async function clearCart() {
      if (!confirm('Are you sure you want to clear the entire cart?')) return;
      
      try {
        const result = await apiCall('/cart/clear', 'DELETE');
        document.getElementById('clear-result').textContent = JSON.stringify(result, null, 2);
        setTimeout(() => getCart(), 500);
      } catch (error) {
        document.getElementById('clear-result').textContent = 'Error: ' + error.message;
      }
    }

    // Auto-load cart on page load
    window.onload = () => {
      getCart();
      // Get first product ID for testing
      fetch(API_URL + '/products?limit=1')
        .then(r => r.json())
        .then(data => {
          if (data.products && data.products.length > 0) {
            document.getElementById('product-id').value = data.products[0].id;
          }
        });
    };
  </script>
</body>
</html>
