<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuji Card Market - Debug</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .status { padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { background: #4CAF50; color: white; }
        .error { background: #f44336; color: white; }
        .loading { background: #2196F3; color: white; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 Fuji Card Market - Debug Page</h1>
    
    <div id="status"></div>
    
    <h2>Tests:</h2>
    <button onclick="testBackend()">Test Backend API</button>
    <button onclick="testReact()">Test React Render</button>
    <button onclick="clearRoot()">Clear & Remount Root</button>
    
    <div id="react-test" style="margin-top: 20px; padding: 20px; background: white; border: 2px solid #e94560;"></div>

    <script>
        const statusDiv = document.getElementById('status');
        
        function showStatus(message, type) {
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        async function testBackend() {
            try {
                showStatus('Testing backend...', 'loading');
                const response = await fetch('http://localhost:5000/api/categories');
                const data = await response.json();
                
                if (data.categories) {
                    showStatus(`✅ Backend Working! Found ${data.categories.length} categories`, 'success');
                    console.log('Categories:', data.categories);
                } else {
                    showStatus('❌ Backend returned unexpected format', 'error');
                }
            } catch (err) {
                showStatus(`❌ Backend Error: ${err.message}`, 'error');
            }
        }

        function testReact() {
            const testDiv = document.getElementById('react-test');
            testDiv.innerHTML = `
                <h3>✅ React Test Successful!</h3>
                <p>If you can see this, React can render into DOM elements.</p>
                <p>The issue is likely with the main React app mounting.</p>
            `;
            showStatus('✅ React DOM manipulation works', 'success');
        }

        function clearRoot() {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = '';
                showStatus('🗑️ Cleared #root div. Check main page now.', 'success');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                showStatus('❌ Could not find #root element', 'error');
            }
        }

        // Auto-test on load
        window.onload = () => {
            showStatus('Debug page loaded. Click buttons to test.', 'success');
        };
    </script>
</body>
</html>
